    <text class="badge" x="289" y="144" text-anchor="middle">[ LLM APPS ]</text>
  </g>

  <!-- Bottom status -->
  <line x1="20" y1="162" x2="840" y2="162" stroke="rgba(56,189,248,0.12)" stroke-width="0.5"/>
  <circle class="pulse-dot" cx="30" cy="172" r="3"/>
  <text class="sysbar" x="42" y="176">SYSTEMS ONLINE · BUILDING IN PUBLIC · OPEN TO OPPORTUNITIES</text>
</svg>
